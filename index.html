<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#0a0a0a', cardBg: '#171717' }
                }
            }
        }
    </script>
    <style>
        .module-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .module-card:hover { transform: scale(1.02); }
        .content-area { display: none; }
        .content-area.active { display: block; animation: slideDown 0.4s ease-out; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen pb-20 transition-colors">

    <div class="fixed top-5 right-5 z-50">
        <button id="theme-toggle" class="p-3 rounded-full bg-white dark:bg-cardBg shadow-lg">
            <i data-lucide="sun" class="hidden dark:block"></i>
            <i data-lucide="moon" class="dark:hidden"></i>
        </button>
    </div>

    <div class="max-w-xl mx-auto px-6 pt-16">
        
        <div class="text-center mb-12">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full mx-auto mb-4 p-1">
                <div class="w-full h-full bg-white dark:bg-darkBg rounded-full flex items-center justify-center font-bold text-2xl">
                    AD
                </div>
            </div>
            <h1 class="text-2xl font-bold">Ad Soyad</h1>
            <p class="text-gray-500 dark:text-gray-400">Geliştirici & Tasarımcı</p>
        </div>

        <div id="module-container" class="space-y-4">
            
            <div class="module-item">
                <button onclick="toggleModule('about-content')" class="module-card w-full p-5 bg-white dark:bg-cardBg rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 flex items-center gap-4">
                    <div class="p-3 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-xl"><i data-lucide="user"></i></div>
                    <span class="font-semibold flex-1 text-left">Hakkımda</span>
                    <i data-lucide="chevron-down" class="opacity-50"></i>
                </button>
                <div id="about-content" class="content-area p-6 bg-gray-100/50 dark:bg-zinc-900/50 rounded-b-2xl -mt-2 border-x border-b dark:border-zinc-800">
                    <p class="text-sm leading-relaxed">Merhaba! Ben modern web teknolojileri üzerine çalışan bir öğrenciyim. React, Tailwind ve Node.js ile ilgileniyorum.</p>
                    <div class="mt-4 flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-white dark:bg-zinc-800 text-xs rounded-full border dark:border-zinc-700">React</span>
                        <span class="px-3 py-1 bg-white dark:bg-zinc-800 text-xs rounded-full border dark:border-zinc-700">TypeScript</span>
                    </div>
                </div>
            </div>

            <div class="module-item">
                <button onclick="toggleModule('projects-content')" class="module-card w-full p-5 bg-white dark:bg-cardBg rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 flex items-center gap-4">
                    <div class="p-3 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-xl"><i data-lucide="layers"></i></div>
                    <span class="font-semibold flex-1 text-left">Projelerim</span>
                    <i data-lucide="chevron-down" class="opacity-50"></i>
                </button>
                <div id="projects-content" class="content-area p-4 space-y-3 bg-gray-100/50 dark:bg-zinc-900/50 rounded-b-2xl -mt-2 border-x border-b dark:border-zinc-800">
                    <a href="#" class="block p-3 bg-white dark:bg-zinc-800 rounded-xl border dark:border-zinc-700 hover:border-purple-500 transition">
                        <h4 class="font-bold text-sm">E-Commerce App</h4>
                        <p class="text-xs opacity-60 font-mono">React, Firebase</p>
                    </a>
                    <a href="#" class="block p-3 bg-white dark:bg-zinc-800 rounded-xl border dark:border-zinc-700 hover:border-purple-500 transition">
                        <h4 class="font-bold text-sm">Portfolio Website</h4>
                        <p class="text-xs opacity-60 font-mono">Tailwind CSS, HTML5</p>
                    </a>
                </div>
            </div>

            <div class="module-item">
                <button onclick="toggleModule('cv-content')" class="module-card w-full p-5 bg-white dark:bg-cardBg rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 flex items-center gap-4">
                    <div class="p-3 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-xl"><i data-lucide="file-text"></i></div>
                    <span class="font-semibold flex-1 text-left">Özgeçmiş (CV)</span>
                    <i data-lucide="chevron-down" class="opacity-50"></i>
                </button>
                <div id="cv-content" class="content-area p-6 bg-gray-100/50 dark:bg-zinc-900/50 rounded-b-2xl -mt-2 border-x border-b dark:border-zinc-800">
                    <div class="flex flex-col gap-3">
                        <button onclick="alert('İndirme başlıyor...')" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i> CV'yi İndir
                        </button>
                        <label class="w-full border-2 border-dashed border-gray-300 dark:border-zinc-700 p-4 rounded-xl text-center cursor-pointer hover:bg-white dark:hover:bg-zinc-800 transition">
                            <span class="text-xs opacity-60">Kendi dosyanı yükle (Max 2MB)</span>
                            <input type="file" class="hidden" onchange="alert('Dosya eklendi: ' + this.files[0].name)">
                        </label>
                    </div>
                </div>
            </div>

            <a href="https://github.com" target="_blank" class="module-card w-full p-5 bg-white dark:bg-cardBg rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 flex items-center gap-4">
                <div class="p-3 bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-white rounded-xl"><i data-lucide="github"></i></div>
                <span class="font-semibold flex-1 text-left">GitHub'da Takip Et</span>
                <i data-lucide="external-link" class="w-4 h-4 opacity-30"></i>
            </a>

            <div class="module-item">
                <button onclick="toggleModule('contact-content')" class="module-card w-full p-5 bg-white dark:bg-cardBg rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 flex items-center gap-4">
                    <div class="p-3 bg-orange-100 dark:bg-orange-900/30 text-orange-600 rounded-xl"><i data-lucide="mail"></i></div>
                    <span class="font-semibold flex-1 text-left">İletişim</span>
                    <i data-lucide="chevron-down" class="opacity-50"></i>
                </button>
                <div id="contact-content" class="content-area p-4 bg-gray-100/50 dark:bg-zinc-900/50 rounded-b-2xl -mt-2 border-x border-b dark:border-zinc-800">
                    <form onsubmit="event.preventDefault(); alert('Mesaj iletildi!');" class="space-y-3">
                        <input type="email" placeholder="E-posta" class="w-full p-3 rounded-xl dark:bg-zinc-800 border dark:border-zinc-700 outline-none focus:ring-1 focus:ring-orange-500 text-sm">
                        <textarea placeholder="Mesajınız" class="w-full p-3 rounded-xl dark:bg-zinc-800 border dark:border-zinc-700 outline-none focus:ring-1 focus:ring-orange-500 text-sm" rows="3"></textarea>
                        <button class="w-full bg-orange-600 text-white py-2 rounded-xl text-sm font-bold">Gönder</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // Modül Aç/Kapat Fonksiyonu
        function toggleModule(id) {
            const content = document.getElementById(id);
            const isActive = content.classList.contains('active');
            
            // Diğerlerini kapat (Opsiyonel: Aynı anda sadece biri açık kalsın istiyorsan)
            document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
            
            if (!isActive) {
                content.classList.add('active');
            }
        }

        // Dark Mode Logic
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });
    </script>
</body>
</html>
